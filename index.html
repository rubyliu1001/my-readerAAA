<title>Novely</title>



<style>
html{height:100%;overflow:hidden;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
:root{
  --bg:#fff;--surface:#F5F4EF;--text:#1A1A1A;--sub:#888;--border:#E5E4DF;--accent:#534AB7;--accent-light:#EEEDFE;
}
body{font-family:-apple-system,'PingFang TC',sans-serif;background:var(--bg);color:var(--text);height:100%;overflow:hidden;display:flex;flex-direction:column;-webkit-user-select:none;user-select:none}
.screen{display:none;flex-direction:column;background:var(--bg);flex:1;overflow:hidden;min-height:0}
.screen.active{display:flex}
/* NAV */
.nav{display:flex;border-top:0.5px solid var(--border);background:var(--bg);flex-shrink:0;padding-bottom:34px}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 10px;border:none;background:none;cursor:pointer;gap:2px;position:relative}
.nav-btn .ni{font-size:22px}
.nav-btn .nl{font-size:11px;color:var(--sub)}
.nav-btn.on .nl{color:var(--accent);font-weight:600}
.nav-dot{width:4px;height:4px;border-radius:50%;background:var(--accent)}
/* SHELF */
.shelf-head{padding:0 14px;flex-shrink:0}
.shelf-title-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.shelf-title{font-size:22px;font-weight:600;color:var(--text)}
.btn-import{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:7px 14px;font-size:13px;cursor:pointer;font-weight:600}
.btn-edit{background:var(--surface);color:var(--accent);border:1px solid #AFA9EC;border-radius:9px;padding:7px 14px;font-size:13px;cursor:pointer;font-weight:600}
.btn-edit.on{background:var(--accent-light)}
.search-bar{display:flex;align-items:center;background:var(--surface);border-radius:11px;padding:8px 12px;margin-bottom:10px;gap:8px}
.search-bar input{flex:1;border:none;background:transparent;font-size:14px;color:var(--text);outline:none}
.tab-row{display:flex;border-bottom:0.5px solid var(--border);flex-shrink:0}
.tab-btn{flex:1;padding:9px 0;text-align:center;font-size:13px;color:var(--sub);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent}
.tab-btn.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.book-grid{flex:1;overflow-y:auto;padding:12px 14px 20px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;align-content:start;-webkit-overflow-scrolling:touch}
.book-card{border-radius:10px;border:0.5px solid var(--border);overflow:hidden;background:var(--bg);cursor:pointer;position:relative;transition:transform .15s}
.book-card.edit-mode{animation:wiggle .5s ease-in-out infinite}
@keyframes wiggle{0%,100%{transform:rotate(-1.8deg)}50%{transform:rotate(1.8deg)}}
.book-color-bar{height:6px}
.book-body{padding:8px 8px 7px}
.book-ttl{font-size:13px;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:2px}
.book-auth{font-size:10px;color:var(--sub);margin-bottom:4px}
.book-pct{font-size:11px;color:var(--accent);font-weight:600}
.tag{font-size:9px;padding:1px 5px;border-radius:6px;font-weight:600;display:inline-block;margin:1px 2px 1px 0}
.card-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;border-radius:10px}
.ov-btn{border:none;border-radius:18px;font-size:12px;padding:5px 13px;cursor:pointer;font-weight:600}
/* READER */
#reader-screen{background:var(--bg);position:relative}
.r-content{position:absolute;inset:0;overflow:hidden;cursor:pointer;padding:22px;padding-top:70px;padding-bottom:80px}
.r-text{white-space:pre-wrap;line-height:1.9}
.r-corner{position:absolute;top:56px;right:14px;background:rgba(0,0,0,.22);border-radius:6px;padding:2px 8px;pointer-events:none;z-index:5}
.r-corner span{font-size:11px;color:#fff}
.r-page-num{position:absolute;bottom:110px;width:100%;text-align:center;font-size:10px;color:var(--sub);pointer-events:none}
/* tap zones */
.tap-left,.tap-mid,.tap-right{position:absolute;top:0;bottom:0;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tap-left{left:0;width:33%}
.tap-mid{left:33%;width:34%}
.tap-right{right:0;width:33%}
/* UI overlay */
.r-top{position:absolute;top:0;left:0;right:0;background:var(--bg);border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px;z-index:20;padding:12px 14px;padding-top:56px}
.r-bot{position:absolute;bottom:0;left:0;right:0;background:var(--bg);border-top:0.5px solid var(--border);z-index:20;padding:12px 14px;padding-bottom:40px}
.prog-wrap{height:20px;display:flex;align-items:center;cursor:pointer;margin:4px 0}
.prog-bg{height:4px;background:var(--surface);border-radius:2px;width:100%;position:relative}
.prog-fill{height:4px;background:var(--accent);border-radius:2px;position:absolute;left:0;top:0}
.ch-nav{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.ch-nav-btn{font-size:13px;color:var(--accent);background:none;border:none;cursor:pointer;padding:5px 6px}
.ch-nav-btn:disabled{color:var(--border)}
/* MODALS */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:flex-end}
.modal-bg.show{display:flex}
.modal-bg.center{align-items:center;justify-content:center}
.sheet{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-height:75vh;display:flex;flex-direction:column;padding-bottom:34px}
.sheet-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:0.5px solid var(--border);flex-shrink:0}
.sheet-title{font-size:15px;font-weight:600;color:var(--text)}
.sheet-close{background:none;border:none;font-size:13px;color:var(--sub);cursor:pointer;padding:4px 8px}
.ch-list{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.ch-row{padding:13px 16px;border-bottom:0.5px solid var(--border);cursor:pointer;font-size:14px;color:var(--text)}
.ch-row.on{background:var(--accent-light);color:var(--accent);font-weight:600}
.finish-sheet{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:34px}
.star-btn{font-size:32px;cursor:pointer;background:none;border:none;padding:2px}
.center-box{background:var(--bg);border-radius:14px;padding:20px;width:84%;max-height:80vh;overflow-y:auto}
/* STATS */
.stats-head{padding:0 14px;flex-shrink:0}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.stat-card{background:var(--surface);border-radius:10px;padding:12px}
.stat-num{font-size:24px;font-weight:600;color:var(--text)}
.stat-lbl{font-size:11px;color:var(--sub);margin-top:2px}
.review-item{border:0.5px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:8px;cursor:pointer}
.review-item:active{background:var(--surface)}
/* SETTINGS */
.settings-section{border:0.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:18px}
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:13px 15px;border-bottom:0.5px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.toggle{width:46px;height:26px;border-radius:13px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;border:none}
.toggle-thumb{position:absolute;top:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
/* FILTER PANEL */
.filter-panel{background:var(--bg);border-bottom:0.5px solid var(--border);padding:10px 14px 12px;flex-shrink:0}
/* EMPTY STATE */
.empty{grid-column:1/-1;text-align:center;padding:50px 0;color:var(--sub)}
.empty .ei{font-size:36px;margin-bottom:8px}
/* IMPORT PROGRESS */
.import-spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
/* NIGHT / SEPIA */
body.night{--bg:#1A1612;--surface:#252018;--text:#D4CCBA;--sub:#8A8070;--border:#333025;--accent:#7F77DD;--accent-light:#2A2850}
body.sepia{--bg:#F5EDDA;--surface:#EDE0C4;--text:#3D2B1A;--sub:#7A5C3A;--border:#D8C9A8;--accent:#854F0B;--accent-light:#EDE0C4}




</style>


</head>

// ── 章節解析 ──
function parseChapters(text){
  const re=/^(第[零一二三四五六七八九十百千0-9０-９]+[章節节回集卷][\s　\t].{0,60})$/gm;
  const ms=[...text.matchAll(re)];
  if(ms.length<2){
    const chunks=[];const size=5000;
    for(let i=0;i<text.length;i+=size)chunks.push({title:`第${Math.floor(i/size)+1}段`,content:text.slice(i,i+size)});
    return chunks.length?chunks:[{title:'全文',content:text}];
  }
  const raw=ms.map((m,i)=>({title:m[0].trim(),content:text.slice(m.index,i+1<ms.length?ms[i+1].index:text.length).trim()}));
  const result=[];let pending='';
  for(let i=0;i<raw.length;i++){
    const body=raw[i].content.replace(raw[i].title,'').trim();
    if(body.length<30&&i+1<raw.length){pending=pending?pending+' · '+raw[i].title:raw[i].title;}
    else{result.push({title:pending?pending+' · '+raw[i].title:raw[i].title,content:raw[i].content});pending='';}
  }
  return result.length?result:raw;
}

// ── 持久化 ──
function save(){
  try{
    // 書籍太大，只存metadata，content另存
    const meta=books.map(b=>({...b,content:undefined,chapters:undefined}));
    localStorage.setItem('books_meta',JSON.stringify(meta));
    books.forEach(b=>{
      if(b.content)localStorage.setItem('book_content_'+b.id,b.content);
    });
    localStorage.setItem('prefs',JSON.stringify({fontSize,lineH,s2tOn,theme}));
  }catch(e){console.warn('save error',e);}
}
function load(){
  try{
    const meta=JSON.parse(localStorage.getItem('books_meta')||'[]');
    books=meta.map(b=>{
      const content=localStorage.getItem('book_content_'+b.id)||'';
      const chapters=parseChapters(content);
      return {...b,content,chapters};
    });
    const prefs=JSON.parse(localStorage.getItem('prefs')||'null');
    if(prefs){fontSize=prefs.fontSize||17;lineH=prefs.lineH||1.9;s2tOn=!!prefs.s2tOn;theme=prefs.theme||'light';}
    // DOM 操作移到 applyPrefsToDOM()
  }catch(e){books=[];}
}

// ── 匯入 ──
function triggerImport(){document.getElementById('file-input').click();}
async function handleFile(input){
  const file=input.files[0];
  if(!file)return;
  const label=document.getElementById('import-label');
  label.innerHTML='<span class="import-spinner"></span>匯入中';
  input.value='';
  try{
    let content='';
    const name=file.name;
    const nameNoExt=name.replace(/\.(txt|zip)$/i,'');
    if(name.toLowerCase().endsWith('.zip')){
      const {default:JSZip}=await import('https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm');
      const zip=await JSZip.loadAsync(file);
      const txts=Object.keys(zip.files).filter(n=>n.endsWith('.txt')&&!zip.files[n].dir).sort();
      if(!txts.length)throw new Error('壓縮檔內找不到 .txt');
      for(const f of txts)content+=await zip.files[f].async('string')+'\n';
    } else {
      // 先試 UTF-8
      try{
        content=await file.text();
        if((content.match(/\uFFFD/g)||[]).length>20)throw new Error('not utf8');
      }catch{
        // GBK fallback
        const buf=await file.arrayBuffer();
        const bytes=new Uint8Array(buf);
        content=decodeGBK(bytes);
      }
    }
    const chapters=parseChapters(content);
    const newBook={
      id:Date.now(),title:nameNoExt,author:'',tags:[],folder:'未讀',
      progress:0,color:COLORS[books.length%COLORS.length],
      lastChapter:0,chapterProgress:{},
      createdAt:new Date().toISOString().slice(0,10),
      content,chapters
    };
    books.unshift(newBook);
    save();
    renderShelf();renderStats();
    alert(`匯入成功！\n《${nameNoExt}》\n共 ${chapters.length} 章節`);
  }catch(e){alert('匯入失敗：'+e.message);}
  label.textContent='＋ 匯入';
}

// ── 翻頁分頁 ──
function splitPages(text){
  const ch_w=fontSize*0.55;
  const chars_per_line=Math.floor((window.innerWidth-48)/ch_w);
  const lh_px=fontSize*lineH;
  const content_h=window.innerHeight-170;
  const lines_per_page=Math.max(3,Math.floor(content_h/lh_px));
  const paras=text.split(/\n+/).map(p=>p.trim()).filter(Boolean);
  const pages=[];let cur=[];let curL=0;
  for(const p of paras){
    const pl=Math.max(1,Math.ceil(p.length/chars_per_line))+0.5;
    if(curL+pl>lines_per_page&&cur.length){pages.push(cur.join('\n\n'));cur=[p];curL=pl;}
    else{cur.push(p);curL+=pl;}
  }
  if(cur.length)pages.push(cur.join('\n\n'));
  return pages.length?pages:[text];
}

function renderPage(){try{
  const book=books.find(b=>b.id===curBookId);
  if(!book)return;
  const chapters=book.chapters||[{title:'全文',content:book.content||''}];
  const ch=chapters[curChIdx]||chapters[0];
  const rt=s2tOn?s2t:t=>t;
  curPages=splitPages(rt(ch.content));
  const sp=Math.min(curPageIdx,curPages.length-1);
  curPageIdx=sp;
  var _rt=document.getElementById('r-text');if(_rt){_rt.style.fontSize=fontSize+'px';
  _rt.style.lineHeight=lineH;}
  $set('r-text','textContent',curPages[sp]||'');
  const overallPct=Math.round(((curChIdx+(curPages.length>1?sp/curPages.length:0))/chapters.length)*100);
  $set('r-corner-pct','textContent',overallPct+'%');
  
  $set('r-title-bar','textContent',rt(book.title));
  $set('r-ch-title','textContent',ch.title);
  const pagePct=curPages.length>1?Math.round(sp/(curPages.length-1)*100):100;
  $set('r-ch-pct','textContent',pagePct+'%');
  var _pf=document.getElementById('prog-fill');if(_pf)_pf.style.width=pagePct+'%';
  $set('ch-counter','textContent',(curChIdx+1)+' / '+chapters.length);
  $set('prev-ch-btn','disabled',curChIdx===0);
  $set('next-ch-btn','disabled',curChIdx>=chapters.length-1);
  // 完讀按鈕
  const isLast=curChIdx===chapters.length-1&&sp>=curPages.length-1;
  var _fr=document.getElementById('r-finish-row');if(_fr)_fr.style.display=(isLast&&!book.rating)?'block':'none';
  // 更新進度
  books=books.map(b=>b.id===curBookId?{...b,lastChapter:curChIdx,chapterProgress:{...(b.chapterProgress||{}),[curChIdx]:pagePct},progress:overallPct}:b);
  save();
  try{localStorage.setItem('last_read',JSON.stringify({bookId:curBookId,chIdx:curChIdx,pageIdx:curPageIdx}));}catch(e){}
}catch(e){console.warn('renderPage error:',e);}}

function goNextPage(){
  const book=books.find(b=>b.id===curBookId);if(!book)return;
  const chapters=book.chapters||[];
  if(curPageIdx<curPages.length-1){curPageIdx++;renderPage();}
  else if(curChIdx<chapters.length-1){curChIdx++;curPageIdx=0;renderPage();}
}
function goPrevPage(){
  if(curPageIdx>0){curPageIdx--;renderPage();}
  else if(curChIdx>0){curChIdx--;curPageIdx=999;renderPage();}
}
function tapLeft(){if(ruiOn){setRUI(false);return;}goPrevPage();}
function tapRight(){if(ruiOn){setRUI(false);return;}goNextPage();}
function tapMid(){setRUI(!ruiOn);}
function setRUI(on){
  ruiOn=on;
  var _rt2=document.getElementById('r-top');if(_rt2)_rt2.style.display=on?'flex':'none';
  var _rb=document.getElementById('r-bot');if(_rb)_rb.style.display=on?'block':'none';
}
function prevChapter(){if(curChIdx>0){curChIdx--;curPageIdx=0;renderPage();}}
function nextChapter(){const b=books.find(x=>x.id===curBookId);if(b&&curChIdx<b.chapters.length-1){curChIdx++;curPageIdx=0;renderPage();}}
function seekProgress(e){
  var _pw=document.getElementById('prog-wrap');if(!_pw)return;const rect=_pw.getBoundingClientRect();
  const pct=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
  const book=books.find(b=>b.id===curBookId);if(!book)return;
  curPageIdx=Math.round(pct*(curPages.length-1));
  renderPage();
}

async function analyzeAI(book){
  try{
    const sample=(book.chapters?.[0]?.content||book.content||'').slice(0,500);
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:150,
        messages:[{role:'user',content:`你是小說分類專家，根據以下資訊返回3-6個繁體中文標籤，純JSON陣列，無其他文字。\n書名：${book.title}\n作者：${book.author||'未知'}\n內容：${sample}\n只輸出陣列如：["武俠","熱血"]`}]
      })
    });
    const data=await res.json();
    const parsed=JSON.parse((data.content?.[0]?.text||'[]').replace(/```json|```/g,'').trim());
    if(Array.isArray(parsed)&&parsed.length){
      books=books.map(b=>b.id===finBookId?{...b,tags:parsed}:b);
      save();renderShelf();
    }
  }catch(e){console.log('AI tag error:',e);}
}

    '.r-top{padding-top:calc(env(safe-area-inset-top,44px) + 10px)}',
    '.r-bot{padding-bottom:calc(env(safe-area-inset-bottom,20px) + 10px)}',
    '.r-corner{top:calc(env(safe-area-inset-top,44px) + 8px)}',
    '.r-content{padding-top:calc(env(safe-area-inset-top,44px) + 16px);padding-bottom:calc(env(safe-area-inset-bottom,20px) + 60px)}',
  ].join('\n');
  document.head.appendChild(safeCSS);

  // Safari 100vh 修正
  function fixHeight(){
    var h = window.innerHeight + 'px';
    document.documentElement.style.height = h;
    document.body.style.height = h;
  }
  fixHeight();
  window.addEventListener('resize', fixHeight);
  window.addEventListener('orientationchange', function(){ setTimeout(fixHeight, 200); });

  applyPrefsToDOM();
  renderShelf();
  renderStats();
  restoreLastRead();
});
</script>
</body>
</html>
